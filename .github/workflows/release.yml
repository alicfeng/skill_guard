name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS：单台 Apple Silicon runner 交叉产出 Intel + Apple 芯片 DMG
          - os: macos-latest
            artifact: mac
            npm-script: build:mac
          # Windows：x64 runner 产出 x64 / arm64 安装包（NSIS）
          - os: windows-latest
            artifact: win
            npm-script: build:win
          # Linux：分别在 x64 / arm64 原生环境打 AppImage，避免交叉编译不稳定
          - os: ubuntu-latest
            artifact: linux-x64
            npm-script: build:linux:x64
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            npm-script: build:linux:arm64

    runs-on: ${{ matrix.os }}
    # 不要在此 job 设置 GH_TOKEN：electron-builder 在 CI 下会用它去调 GitHub API 建 Release，
    # 而本 job 只有 contents:read，会 403。发版由下方 release job 完成。

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run ${{ matrix.npm-script }}
        env:
          # Runner 默认注入 GITHUB_TOKEN；electron-builder 在 CI 里会用它调 Releases API。
          # 本 job 仅有 contents:read，会 403。发版由 release job 完成。
          GITHUB_TOKEN: ""
          GH_TOKEN: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-packages
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-packages/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
